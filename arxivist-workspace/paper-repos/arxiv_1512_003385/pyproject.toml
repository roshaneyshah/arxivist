[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "resnet_cifar"
version = "0.1.0"
description = "Reproduction of CIFAR-10 ResNets from He et al. 2015 (arXiv:1512.03385)."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [{name = "ArXivist (auto-generated)"}]
dependencies = [
    "torch>=2.0,<3.0",
    "torchvision>=0.15",
    "numpy>=1.24",
    "pyyaml>=6.0",
    "tqdm>=4.65",
]

[project.optional-dependencies]
dev = ["pytest>=7.4", "ruff>=0.1", "ipykernel>=6.25", "matplotlib>=3.7"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"
