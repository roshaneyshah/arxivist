name: arxivist_bootstrap
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy=1.26.*
  - pandas=2.2.*
  - scipy=1.12.*
  - statsmodels=0.14.*
  - matplotlib=3.8.*
  - pyyaml=6.0.*
  - pip
  - pip:
      - torch==2.2.*
      - pytest==8.*
      - pytest-cov==5.*
      - black==24.*
      - ruff==0.4.*
      - mypy==1.*
