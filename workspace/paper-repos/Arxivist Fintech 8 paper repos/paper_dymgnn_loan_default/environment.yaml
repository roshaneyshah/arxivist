name: dymgnn
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pytorch>=2.1.0
  - pytorch-cuda=11.8
  - numpy>=1.24.0
  - scipy>=1.11.0
  - pandas>=2.0.0
  - scikit-learn>=1.3.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - pyyaml>=6.0.1
  - jupyter
  - ipywidgets
  - pip
  - pip:
    - xgboost>=2.0.0
    - shap>=0.43.0
    - pyarrow>=13.0.0
    - -e .
