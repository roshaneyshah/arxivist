# TRANSFORMERS on NASDAQ-100 (Table 3)
# Reward: log-return; cash-allowed; flat Dirichlet; transformer encoder
seed: 42
device: cuda

model:
  encoder_type: transformer
  transformer_hidden: 128
  transformer_layers: 2
  transformer_heads: 4  # ASSUMED — paper doesn't specify
  policy_type: flat_dirichlet
  critic_hidden: [256, 256]
  allow_cash: true
  feature_fusion: concat

training:
  lr_actor: 3.0e-4
  lr_critic: 5.0e-4
  lr_entropy: 3.0e-4
  alpha: 0.2
  gamma: 0.99
  tau: 0.005
  batch_size: 128
  replay_capacity: 20000
  warmup_steps: 500
  gradient_steps: 2
  epochs: 50
  early_stopping_patience: 8

data:
  market: ndx
  benchmark: QQQ
  lookback_window: 60
  topk: 20
  momentum_horizon: 120
  start_date: "2003-01-02"
  end_date: "2026-03-13"
  transaction_cost_bps: 2.0

evaluation:
  train_years: 5
  val_years: 1
  test_years: 1
  num_folds: 16
  adaptive_retrain_window: 5
  max_folds_without_retraining: 3
  reward_type: log_return_absolute
  lambda_turnover: 0.003
  lambda_concentration: 0.1
