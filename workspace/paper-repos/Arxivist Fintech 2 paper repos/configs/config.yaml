# ============================================================
# Empirical Asset Pricing via Machine Learning
# Gu, Kelly, Xiu — Review of Financial Studies 2020
# doi:10.1093/rfs/hhaa009
# ============================================================

data:
  crsp_path: "data/raw/crsp_returns.parquet"
  chars_path: "data/raw/characteristics.parquet"
  macro_path: "data/raw/macro_predictors.csv"
  train_end_year: 1974        # Paper: 18-year training window starting 1957
  val_end_year: 1986          # Paper: 12-year validation window 1975-1986
  test_end_year: 2016         # Paper: 30-year test window 1987-2016
  refit_frequency: "annual"   # Paper: refit models once per year (Section 2.1)
  val_window_years: 12        # Paper: rolling 12-month validation window
  missing_fill: "cross_sectional_median"  # Paper Section 2.1 footnote 30
  char_lag_monthly_months: 1   # Paper: monthly chars delayed 1 month
  char_lag_quarterly_months: 4 # Paper: quarterly chars delayed 4 months
  char_lag_annual_months: 6    # Paper: annual chars delayed 6 months
  n_characteristics: 94        # Paper Section 2.1
  n_macro_predictors: 8        # Paper Section 2.1: dp, ep, bm, ntis, tbl, tms, dfy, svar
  n_industry_dummies: 74       # Paper Section 2.1: first two SIC digits
  total_features: 920          # Paper: 94*(8+1)+74 = 920

model:
  variant: "NN3"  # Options: OLS, OLS3, ENet, PCR, PLS, GLM, RF, GBRT, NN1, NN2, NN3, NN4, NN5

  # Neural network architectures (Section 1.7, geometric pyramid rule from Masters 1993)
  nn_architectures:
    NN1: [32]
    NN2: [32, 16]
    NN3: [32, 16, 8]    # Best performer in paper
    NN4: [32, 16, 8, 4]
    NN5: [32, 16, 8, 4, 2]

  activation: "relu"         # Paper Section 1.7: ReLU activation
  use_batch_norm: true       # Paper Section 1.7: batch normalization
  use_huber_loss: true       # Paper: +H variants (Tables 1,3) outperform L2

  # ASSUMED: ensemble seed count not stated in paper (confidence 0.50)
  # TODO: verify from paper or Internet Appendix B.3
  n_ensemble_seeds: 10

training:
  optimizer: "adam"          # Paper Section 1.7: Adam with learning rate shrinkage

  # ASSUMED: standard Adam defaults — paper specifies Adam but not lr (confidence 0.65)
  # TODO: verify from Internet Appendix B.3
  lr: 0.001
  beta1: 0.9
  beta2: 0.999
  eps: 1.0e-8
  weight_decay: 0.0

  # ASSUMED: L1 lambda grid not stated in paper (confidence 0.52)
  # TODO: verify from Internet Appendix B.3
  l1_lambda_grid: [0.0001, 0.001, 0.01, 0.1]

  # Huber loss xi tuning
  huber_xi_grid: [0.5, 1.0, 2.0, 5.0]

  # ASSUMED: batch size not stated in paper (confidence 0.45)
  # TODO: verify from Internet Appendix B.3
  batch_size: 512

  # ASSUMED: early stopping patience not stated (confidence 0.55)
  # TODO: verify from Internet Appendix B.3
  early_stopping_patience: 5
  max_epochs: 100

  log_every_n_steps: 100
  save_checkpoint: true
  checkpoint_dir: "models/"

elastic_net:
  lambda_grid: [0.0001, 0.001, 0.01, 0.1, 1.0]
  rho_grid: [0.0, 0.25, 0.5, 0.75, 1.0]   # 0=lasso, 1=ridge

pcr:
  K_grid: [1, 2, 5, 10, 20, 40]  # Number of principal components

pls:
  K_grid: [1, 2, 3, 5, 10]       # Number of PLS components (paper: 3-6)

glm:
  # ASSUMED: spline knot placement strategy not specified (confidence 0.62)
  # TODO: check if paper specifies knot locations
  knot_strategy: "quantiles"
  spline_order_K_grid: [3, 4, 5]
  lambda_grid: [0.001, 0.01, 0.1, 1.0]

trees:
  # GBRT (Section 1.6, gradient boosted regression trees)
  gbrt_depth_grid: [1, 2, 3]        # Paper: "average less than 6 leaves" → shallow
  gbrt_nu_grid: [0.01, 0.05, 0.1]   # Shrinkage factor nu
  gbrt_B_grid: [500, 1000]           # Number of boosting iterations

  # Random forest (Section 1.6)
  rf_depth_grid: [3, 5, 10, -1]     # -1 = unlimited
  rf_m_grid: ["sqrt", "third"]       # Features per split
  rf_B: 300    # ASSUMED: Breiman (2001) default

evaluation:
  output_dir: "results/"
  figures_dir: "results/figures/"
  compute_variable_importance: true
  importance_method: "r2_reduction"   # Options: r2_reduction, ssd
  n_portfolio_deciles: 10
  portfolio_weighting: "value"        # Options: value, equal
  factor_model: "FF5_plus_momentum"   # 6-factor model for alpha tests
  market_timing_max_leverage: 1.5     # Paper Section 2.4.1
  market_timing_allow_short: false    # Paper: long-only constraint for non-factor portfolios

hardware:
  device: "cuda"             # Falls back to cpu if cuda unavailable
  num_workers: 4
  seed: 42
  deterministic: false       # Set true for exact reproducibility (may slow training)
