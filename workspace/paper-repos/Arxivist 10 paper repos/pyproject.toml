[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rlte"
version = "0.1.0"
description = "Reference implementation scaffold for 'Reinforcement Learning for Trade Execution with Market and Limit Orders' (arXiv:2507.06345), generated by ArXivist."
requires-python = ">=3.10"

[tool.setuptools.packages.find]
where = ["src"]
