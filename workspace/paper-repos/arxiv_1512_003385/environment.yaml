name: resnet-cifar
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pytorch>=2.0,<3.0
  - torchvision>=0.15
  - pytorch-cuda=11.8     # remove if running CPU-only
  - numpy>=1.24
  - pyyaml>=6.0
  - tqdm>=4.65
  - pillow>=10.0
  - pip:
    - ipykernel>=6.25
    - matplotlib>=3.7
    - jupyter>=1.0
    - pytest>=7.4
    - ruff>=0.1
