# Allen-Cahn equation — Discrete-time PINN (implicit Runge-Kutta)
# Paper: Section 3.1.1
# Target relative L2 error: 6.99e-3

model:
  type: discrete
  pde: allen_cahn
  hidden_layers: 4      # 4 layers × 200 neurons (Section 3.1.1)
  hidden_neurons: 200
  activation: tanh
  q: 100                # Runge-Kutta stages (Section 3.1.1)
  dt: 0.8               # Time step Δt
  t_start: 0.1
  t_end: 0.9

data:
  Nn: 200               # Spatial data points at t_start (Section 3.1.1)
  x_domain: [-1.0, 1.0]
  seed: 42

training:
  optimizer: lbfgs
  max_iter: 50000
  tolerance_grad: 1.0e-7
  tolerance_change: 1.0e-9
  history_size: 50
  line_search_fn: strong_wolfe

evaluation:
  grid_x: 512
  metric: relative_l2

hardware:
  device: cuda
  dtype: float32
