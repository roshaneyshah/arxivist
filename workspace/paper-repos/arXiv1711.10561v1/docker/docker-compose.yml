version: "3.9"

services:
  train:
    build: ..
    image: pinns:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ../results:/workspace/results
      - ../data:/workspace/data
    command: >
      python train.py
        --config configs/burgers_continuous.yaml
        --verbose

  notebook:
    image: pinns:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "8888:8888"
    volumes:
      - ../notebooks:/workspace/notebooks
      - ../results:/workspace/results
      - ../data:/workspace/data
    command: >
      jupyter notebook
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --allow-root
        --notebook-dir=/workspace/notebooks
