version: "3.8"

services:
  train:
    build: ..
    volumes:
      - ..:/workspace
      - ../data:/workspace/data
      - ../results:/workspace/results
    command: python train.py --config configs/sbm_default.yaml

  notebook:
    build: ..
    volumes:
      - ..:/workspace
      - ../data:/workspace/data
      - ../results:/workspace/results
    ports:
      - "8888:8888"
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
