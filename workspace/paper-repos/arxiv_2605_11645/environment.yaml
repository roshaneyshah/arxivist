name: geomherd
channels:
  - defaults
  - conda-forge
  - pytorch
dependencies:
  - python=3.10
  - numpy>=1.24
  - scipy>=1.11
  - pyyaml>=6.0
  - pandas>=2.0
  - scikit-learn>=1.3
  - statsmodels>=0.14
  - tqdm>=4.65
  - networkx>=3.2
  - matplotlib>=3.7
  - seaborn>=0.12
  - jupyter
  - pytorch>=2.1.0
  - cpuonly  # remove and add cudatoolkit if GPU training needed
  - pip
  - pip:
    - POT>=0.9.3
    - anthropic>=0.25.0
    - pytest>=7.4
    - black>=23.0
