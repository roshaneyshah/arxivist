version: "3.8"
services:
  train:
    build: ..
    volumes:
      - ../data:/app/data
      - ../results:/app/results
      - ../models:/app/models
    command: python train.py --config configs/config.yaml

  notebook:
    build: ..
    ports:
      - "8888:8888"
    volumes:
      - ../notebooks:/app/notebooks
      - ../data:/app/data
    command: jupyter notebook --ip=0.0.0.0 --no-browser --allow-root --notebook-dir=/app/notebooks
