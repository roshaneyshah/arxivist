version: "3.8"

services:
  train:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../:/workspace
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: python train.py --config configs/config.yaml

  notebook:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../:/workspace
    ports:
      - "8888:8888"
    command: >
      jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
      --NotebookApp.token='' --notebook-dir=/workspace/notebooks
