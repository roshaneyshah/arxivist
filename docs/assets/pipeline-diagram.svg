<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 820" role="img" width="100%">
  <title>ArXivist pipeline — six stages from paper to reproducibility report</title>
  <desc>
    A vertical flowchart showing the six ArXivist pipeline stages:
    Paper Parser, SIR Registry, Architecture Planner, Code Generator,
    Notebook Generator, and Results Comparator, connected by arrows,
    with the SIR Registry and global index shown as side storage.
  </desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── INPUT ─────────────────────────────────────────────────────────── -->
  <rect x="200" y="20" width="280" height="52" rx="8"
        fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#0C447C">
    Paper
  </text>
  <text x="340" y="60" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#185FA5">
    arXiv URL · DOI · PDF
  </text>

  <!-- arrow: paper → stage 1 -->
  <line x1="340" y1="72" x2="340" y2="108"
        stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── STAGE 1 ────────────────────────────────────────────────────────── -->
  <rect x="160" y="110" width="360" height="60" rx="8"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="134" text-anchor="middle"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">
    Stage 1 — Paper Parser
  </text>
  <text x="340" y="154" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#534AB7">
    PDF → Scientific Intermediate Representation (SIR)
  </text>

  <!-- arrow: stage 1 → stage 2 -->
  <line x1="340" y1="170" x2="340" y2="206"
        stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── STAGE 2 ────────────────────────────────────────────────────────── -->
  <rect x="160" y="208" width="360" height="60" rx="8"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="232" text-anchor="middle"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">
    Stage 2 — SIR Registry
  </text>
  <text x="340" y="252" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#534AB7">
    Versioned storage · global index · provenance tracking
  </text>

  <!-- side: SIR registry store -->
  <rect x="560" y="218" width="100" height="44" rx="6"
        fill="#F1EFE8" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="610" y="237" text-anchor="middle"
        font-family="sans-serif" font-size="11" fill="#5F5E5A">sir-registry/</text>
  <text x="610" y="253" text-anchor="middle"
        font-family="sans-serif" font-size="10" fill="#888780">global_index.json</text>
  <line x1="520" y1="238" x2="558" y2="238"
        stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#arr)"/>

  <!-- arrow: stage 2 → stage 3 -->
  <line x1="340" y1="268" x2="340" y2="304"
        stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── STAGE 3 ────────────────────────────────────────────────────────── -->
  <rect x="160" y="306" width="360" height="60" rx="8"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="330" text-anchor="middle"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">
    Stage 3 — Architecture Planner
  </text>
  <text x="340" y="350" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#534AB7">
    SIR → module hierarchy · tensor flows · config · Docker
  </text>

  <!-- arrow: stage 3 → stage 4 -->
  <line x1="340" y1="366" x2="340" y2="402"
        stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── STAGE 4 ────────────────────────────────────────────────────────── -->
  <rect x="160" y="404" width="360" height="60" rx="8"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="428" text-anchor="middle"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">
    Stage 4 — Code Generator
  </text>
  <text x="340" y="448" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#534AB7">
    Full Git repo · src · configs · Dockerfile · README
  </text>

  <!-- arrow: stage 4 → stage 5 -->
  <line x1="340" y1="464" x2="340" y2="500"
        stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── STAGE 5 ────────────────────────────────────────────────────────── -->
  <rect x="160" y="502" width="360" height="60" rx="8"
        fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="526" text-anchor="middle"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">
    Stage 5 — Notebook Generator
  </text>
  <text x="340" y="546" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#534AB7">
    Runnable .ipynb · component demos · mini training loop
  </text>

  <!-- side: paper-repos store -->
  <rect x="560" y="414" width="100" height="44" rx="6"
        fill="#F1EFE8" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="610" y="432" text-anchor="middle"
        font-family="sans-serif" font-size="11" fill="#5F5E5A">paper-repos/</text>
  <text x="610" y="448" text-anchor="middle"
        font-family="sans-serif" font-size="10" fill="#888780">{paper_id}/</text>
  <line x1="520" y1="434" x2="558" y2="434"
        stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#arr)"/>

  <!-- ── USER STEP ──────────────────────────────────────────────────────── -->
  <rect x="200" y="590" width="280" height="44" rx="8"
        fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="340" y="610" text-anchor="middle"
        font-family="sans-serif" font-size="13" font-weight="500" fill="#27500A">
    You run the code
  </text>
  <text x="340" y="626" text-anchor="middle"
        font-family="sans-serif" font-size="11" fill="#3B6D11">
    train · evaluate · collect results
  </text>

  <!-- arrow: stage 5 → user -->
  <line x1="340" y1="562" x2="340" y2="588"
        stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- arrow: user → stage 6 -->
  <line x1="340" y1="634" x2="340" y2="670"
        stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ── STAGE 6 ────────────────────────────────────────────────────────── -->
  <rect x="160" y="672" width="360" height="60" rx="8"
        fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="696" text-anchor="middle"
        font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">
    Stage 6 — Results Comparator
  </text>
  <text x="340" y="716" text-anchor="middle"
        font-family="sans-serif" font-size="12" fill="#854F0B">
    Deviation scores · reproducibility score · hallucination report
  </text>

  <!-- side: comparison/ output -->
  <rect x="560" y="682" width="100" height="44" rx="6"
        fill="#F1EFE8" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="610" y="700" text-anchor="middle"
        font-family="sans-serif" font-size="11" fill="#5F5E5A">comparison/</text>
  <text x="610" y="716" text-anchor="middle"
        font-family="sans-serif" font-size="10" fill="#888780">4 artifacts</text>
  <line x1="520" y1="702" x2="558" y2="702"
        stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#arr)"/>

  <!-- ── FOOTER ─────────────────────────────────────────────────────────── -->
  <text x="340" y="786" text-anchor="middle"
        font-family="sans-serif" font-size="11" fill="#888780">
    github.com/qosi-org/arxivist
  </text>
</svg>
